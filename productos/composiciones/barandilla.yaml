producto: Barandilla metálica
unidad_base: metro_lineal

materiales_principales:
  - nombre: Pasamanos
    tipo: tubo_redondo / perfil_rectangular / madera
  - nombre: Barrotes
    tipo: tubo_redondo / pletina / perfil_cuadrado
  - nombre: Largueros
    tipo: tubo / perfil_rectangular
  - nombre: Pletina base
    tipo: pletina_acero / pletina_inox

materiales_auxiliares:
  - nombre: Tornillería de anclaje
    tipo: acero_inoxidable / acero_galvanizado
  - nombre: Tacos químicos
    tipo: resina_epoxi / cápsula
  - nombre: Arandelas y tuercas
    tipo: acero_inoxidable
  - nombre: Discos de corte
    tipo: acero / inoxidable
  - nombre: Hilo de soldadura
    tipo: MIG_MAG / TIG
  - nombre: Gas de protección
    tipo: CO2 / argon / mezcla
  - nombre: Pintura
    tipo: esmalte / poliuretano / epoxi
  - nombre: Imprimación
    tipo: anticorrosiva / epoxi / fosfatante

procesos:
  - medicion_y_replanteo
  - diseño_y_despiece
  - corte_laser / corte_inglete
  - preparacion_de_bordes
  - soldadura_MIG / soldadura_TIG
  - repasado_y_limpieza
  - tratamiento_superficial
  - transporte
  - montaje_en_obra
  - retoques_finales

variables_tecnicas:
  - metros_lineales
  - altura
  - numero_de_tramos
  - tipo_anclaje: lateral / superior / inferior / frontal
  - tipo_material: acero / inoxidable_304 / inoxidable_316 / aluminio / hierro
  - acabado: pintado / galvanizado / inox_cepillado / lacado
  - ambiente: interior / exterior / C3 / C4 / C5
  - dificultad_montaje: baja / media / alta
  - geometria: recta / curva / poligonal / escalera
  - accesibilidad: buena / media / mala

factores_complejidad:
  - muchos_tramos_cortos
  - formas_irregulares
  - escaleras_de_caracol
  - anclajes_laterales_sin_apoyo
  - ambiente_marino_C5
  - montaje_con_cliente_presente
  - falta_de_medidas_claras
  - combinacion_con_vidrio
  - iluminacion_LED_integrada

costes_a_considerar:
  materiales: true
  mano_obra_taller: true
  mano_obra_montaje: true
  maquinaria: true
  consumibles: true
  transporte: true
  tratamiento_superficial: true
  riesgo: true
  margen: true
  mermas: true

mermas_recomendadas:
  acero: 0.05
  inoxidable: 0.08
  aluminio: 0.05
  consumibles: 0.03

tolerancias:
  corte: plus_minus_1mm
  soldadura: clase_C
  montaje: plus_minus_5mm

controles_calidad:
  - inspeccion_visual_soldaduras
  - verificacion_medidas
  - prueba_nivelacion
  - espesor_pintura
